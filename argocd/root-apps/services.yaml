apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-services
  namespace: argocd
spec:
  project: services
  syncPolicy:
    automated: {}
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/leohauschild/homelab.git
      targetRevision: &revision "HEAD"
      path: argocd/applications/services
      directory:
        recurse: true
