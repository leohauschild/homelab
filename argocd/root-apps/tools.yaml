apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-tools
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated: {}
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/leohauschild/homelab.git
      targetRevision: &revision "HEAD"
      path: argocd/applicationsets/tools
    - repoURL: https://github.com/leohauschild/homelab.git
      targetRevision: *revision
      path: argocd/projects
