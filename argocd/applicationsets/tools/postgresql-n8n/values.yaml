fullnameOverride: "postgresql-n8n"

global:
  security:
    allowInsecureImages: true
  defaultStorageClass: "proxmox-csi-default"
  postgresql:
    auth:
      username: "postgres"
      database: "n8n"
      existingSecret: "postgresql-credentials-n8n"
      secretKeys:
        adminPasswordKey: "postgres-password"
        userPasswordKey: "password"
image:
  repository: bitnamilegacy/postgresql
  tag: "17.4.0-debian-12-r17"
primary:
  persistence:
    enabled: true
    volumeName: "data"
    accessModes:
      - ReadWriteOnce
    size: 10Gi
