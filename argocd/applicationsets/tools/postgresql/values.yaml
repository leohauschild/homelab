global:
  security:
    allowInsecureImages: true
  defaultStorageClass: "proxmox-csi-default"
  postgresql:
    auth:
      username: "homelab"
      database: ""
      existingSecret: "postgresql-credentials"
      secretKeys:
        adminPasswordKey: "postgres-password"
        userPasswordKey: "password"
image:
  repository: bitnamilegacy/postgresql
  tag: "17.4.0-debian-12-r17"
primary:
  persistence:
    enabled: true
    volumeName: "data"
    accessModes:
      - ReadWriteOnce
    size: 10Gi
