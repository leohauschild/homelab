apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-tools
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: "https://github.com/leohauschild/homelab.git"
              revision: "main"
              files:
                - path: "argocd/applicationsets/tools/tools-config.yaml"
          - list:
              elements: []
              elementsYaml: "{{ .configs | toJson }}"
  template:
    metadata:
      name: "{{ .name }}"
    spec:
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
      project: "{{ .project }}"
      sources:
        - repoURL: https://github.com/leohauschild/homelab.git
          targetRevision: &revision "HEAD"
          ref: values
        - repoURL: "{{ .repoUrl }}"
          chart: "{{ .chart }}"
          path: "{{ .path }}"
          targetRevision: "{{ .targetRevision }}"
          helm:
            releaseName: "{{ .releaseName }}"
            valueFiles:
              - $values/argocd/applicationsets/tools/{{ .name }}/values.yaml
        - repoURL: https://github.com/leohauschild/homelab.git
          targetRevision: *revision
          path: argocd/applicationsets/tools/{{ .name }}/manifests
          directory:
            recurse: true
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .namespace }}"
  syncPolicy:
    preserveResourcesOnDeletion: true
